name = "bks-agent"
main = "orchestrator.js"
compatibility_date = "2024-01-01"
workers_dev = true

# Cron: catalog refresh + evaluation — 12:00 CET ogni giorno
[triggers]
crons = ["0 10 * * *"]

# KV namespace: crea con
#   npx wrangler kv namespace create BKS_AGENT_KV --config wrangler.toml
# poi incolla l'id qui sotto
[[kv_namespaces]]
binding = "BKS_AGENT_KV"
id      = "8f6b1e4accae47949b2960735d270a3a"

# Secrets (set via wrangler secret put):
#   OPENAI_API_KEY
#   SHOPIFY_DOMAIN
#   SHOPIFY_TOKEN
#   SHOPIFY_API_VERSION
